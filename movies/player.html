<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Now – SandeepFlix</title>
    <meta name="description" content="Stream movies instantly on SandeepFlix.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --purple: #7C3AED;
            --cyan: #06B6D4;
            --dark-bg: #0a0a0a;
            --surface-bg: #121212;
            --glass-bg: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.18);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --font-primary: 'Inter', sans-serif;
            --font-heading: 'Poppins', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font-primary); background: #000; color: var(--text-primary); min-height:100vh; }
        a { text-decoration: none; color: inherit; }
        .navbar {
            position: sticky; top:0; z-index:10;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.75rem 1rem;
        }
        .nav-container {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto;
        }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .logo-text {
            font-family: var(--font-heading); font-size: 1.6rem; font-weight: 700;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .accent { color: var(--cyan); -webkit-text-fill-color: var(--cyan); }
        .btn-back {
            color: white; background: var(--glass-bg); padding: 0.5rem 1.2rem;
            border-radius: 8px; font-size: 0.9rem; transition: background 0.3s;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-back:hover { background: rgba(255,255,255,0.2); }
        .player-container { max-width: 1000px; margin: 0 auto; padding: 1rem; }
        .video-wrapper {
            width: 100%; background: #000; border-radius: 12px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 1.5rem;
            position: relative;
        }
        video { width: 100%; display: block; outline: none; background: black; }
        .error-overlay {
            display: none; position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); color: white; text-align: center;
            padding: 2rem; flex-direction: column; justify-content: center; align-items: center;
        }
        .error-overlay.show { display: flex; }
        .error-msg { color: #ff4d4d; font-size: 1.2rem; margin-bottom: 1rem; }
        .btn-download, .btn-iframe {
            background: var(--purple); color: white; padding: 0.7rem 1.5rem;
            border-radius: 8px; margin: 0.5rem; text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500;
        }
        .info-panel {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 1.5rem; margin-bottom: 2rem;
        }
        .movie-title { font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 0.5rem; }
        .meta { display: flex; flex-wrap: wrap; gap: 1rem; color: var(--text-secondary); margin-bottom: 1rem; }
        .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .btn { padding: 0.6rem 1.4rem; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.18); background: var(--glass-bg); color: white; }
        .btn-favorite.active { background: var(--purple); border-color: var(--purple); }
        .btn-watchlater.active { background: var(--cyan); border-color: var(--cyan); }
        .btn:hover { transform: translateY(-2px); }
        .footer { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 0.85rem; }
        @media (max-width: 768px) {
            .movie-title { font-size: 1.5rem; }
            .logo-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <span class="logo-text">Sandeep<span class="accent">Flix</span></span>
                </a>
                <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
            <div class="nav-right">
                <span id="nowPlayingTitle"></span>
            </div>
        </div>
    </nav>

    <main class="player-container">
        <div class="video-wrapper">
            <video id="videoPlayer" controls autoplay muted playsinline></video>
            <div id="errorOverlay" class="error-overlay">
                <p class="error-msg"><i class="fas fa-exclamation-triangle"></i> Video cannot be played directly</p>
                <p style="color:#ccc; margin-bottom:1rem;">This may be due to your site’s security policy blocking external videos.</p>
                <div>
                    <a id="downloadBtn" href="#" class="btn-download" target="_blank">
                        <i class="fas fa-download"></i> Download & Watch
                    </a>
                    <button id="iframeFallbackBtn" class="btn-download" style="background: var(--cyan);">
                        <i class="fas fa-play"></i> Try iframe player
                    </button>
                </div>
            </div>
        </div>

        <!-- Hidden iframe fallback (shown on demand) -->
        <div id="iframeWrapper" style="display:none; margin-bottom:1.5rem;">
            <p style="color:var(--text-secondary); margin-bottom:0.5rem;"><strong>Fallback iframe:</strong></p>
            <iframe id="fallbackIframe" style="width:100%; height:400px; border:none; border-radius:12px;" allowfullscreen></iframe>
        </div>

        <div class="info-panel">
            <h2 class="movie-title" id="playerMovieTitle">Loading…</h2>
            <div class="meta" id="playerMeta"></div>
            <div class="actions">
                <button class="btn btn-favorite" id="playerFav"><i class="far fa-heart"></i> Favorite</button>
                <button class="btn btn-watchlater" id="playerWl"><i class="far fa-clock"></i> Watch Later</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 SandeepFlix. All rights reserved.</p>
    </footer>

    <!-- Inline movie data (same as before) -->
    <script>
        const moviesData = [
            { id:1, title:"Pritam and Pedro", year:2026, genre:"cybercrime comedy-thriller", rating:7.8, poster:"https://img1.hotstarext.com/image/upload/f_auto/sources/r1/cms/prod/380/1782998630380-h", backdrop:"https://picsum.photos/seed/dune-back/1280/720", description:"A noble family...", duration:"2h 35m", director:"Denis Villeneuve", cast:["Timothée Chalamet","Rebecca Ferguson","Oscar Isaac"], trailerUrl:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4", categories:["trending","popular","topRated","recommended"], tags:["sci-fi","adventure"] },
            { id:2, title:"The Batman", year:2022, genre:"Action", rating:7.8, poster:"https://picsum.photos/seed/batman/300/450", backdrop:"https://picsum.photos/seed/batman-back/1280/720", description:"...", duration:"2h 56m", director:"Matt Reeves", cast:["Robert Pattinson","Zoë Kravitz","Paul Dano"], trailerUrl:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4", categories:["trending","popular","newReleases"], tags:["action","crime"] },
            // ... (add all 10 movies for completeness)
        ];
    </script>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = parseInt(urlParams.get('id'));
            const video = document.getElementById('videoPlayer');
            const errorOverlay = document.getElementById('errorOverlay');
            const downloadBtn = document.getElementById('downloadBtn');
            const iframeFallbackBtn = document.getElementById('iframeFallbackBtn');
            const iframeWrapper = document.getElementById('iframeWrapper');
            const fallbackIframe = document.getElementById('fallbackIframe');
            const titleEl = document.getElementById('playerMovieTitle');
            const metaEl = document.getElementById('playerMeta');
            const nowPlaying = document.getElementById('nowPlayingTitle');
            const favBtn = document.getElementById('playerFav');
            const wlBtn = document.getElementById('playerWl');

            const movie = moviesData.find(m => m.id === movieId);
            if (!movieId || !movie) {
                titleEl.textContent = movieId ? 'Movie not found' : 'No movie selected';
                return;
            }

            titleEl.textContent = movie.title;
            nowPlaying.textContent = movie.title;
            metaEl.innerHTML = `<span>${movie.year}</span><span>${movie.duration}</span><span><i class="fas fa-star" style="color:var(--cyan)"></i> ${movie.rating}</span><span>${movie.genre}</span>`;

            // Set download link
            downloadBtn.href = movie.trailerUrl;

            // Try to play the video
            video.src = movie.trailerUrl;
            video.load();

            video.addEventListener('error', function() {
                errorOverlay.classList.add('show');
                // Hide the video element to show overlay cleanly
                video.style.display = 'none';
            });

            // If video can play, hide error overlay
            video.addEventListener('canplay', function() {
                errorOverlay.classList.remove('show');
                video.style.display = 'block';
            });

            // Iframe fallback button
            iframeFallbackBtn.addEventListener('click', function() {
                iframeWrapper.style.display = 'block';
                fallbackIframe.src = movie.trailerUrl;
                // Scroll to iframe
                iframeWrapper.scrollIntoView({ behavior: 'smooth' });
            });

            // Continue Watching & localStorage buttons
            try {
                let list = JSON.parse(localStorage.getItem('continueWatching') || '[]');
                if (!list.includes(movie.id)) {
                    list.unshift(movie.id);
                    localStorage.setItem('continueWatching', JSON.stringify(list));
                }
            } catch(e) {}

            function updateButton(btn, storageKey) {
                try {
                    const arr = JSON.parse(localStorage.getItem(storageKey) || '[]');
                    btn.classList.toggle('active', arr.includes(movie.id));
                } catch(e) {}
            }
            updateButton(favBtn, 'favorites');
            updateButton(wlBtn, 'watchLater');

            favBtn.addEventListener('click', () => {
                let favs = JSON.parse(localStorage.getItem('favorites') || '[]');
                if (favs.includes(movie.id)) favs = favs.filter(id => id !== movie.id);
                else favs.push(movie.id);
                localStorage.setItem('favorites', JSON.stringify(favs));
                favBtn.classList.toggle('active');
            });
            wlBtn.addEventListener('click', () => {
                let wl = JSON.parse(localStorage.getItem('watchLater') || '[]');
                if (wl.includes(movie.id)) wl = wl.filter(id => id !== movie.id);
                else wl.push(movie.id);
                localStorage.setItem('watchLater', JSON.stringify(wl));
                wlBtn.classList.toggle('active');
            });
        })();
    </script>
</body>
</html>
