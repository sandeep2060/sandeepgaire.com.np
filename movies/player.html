<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Now – SandeepFlix</title>
  <meta name="description" content="Stream movies instantly on SandeepFlix.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .player-page { background: #000; }
    .player-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .player-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }
    .video-wrapper {
      width: 100%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      margin-bottom: 1.5rem;
    }
    video {
      width: 100%;
      display: block;
      outline: none;
    }
    .player-info-panel {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .player-movie-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .player-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      color: #b3b3b3;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }
    .player-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .btn-favorite, .btn-watchlater {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    .btn-favorite.active { background: #7C3AED; border-color: #7C3AED; }
    .btn-watchlater.active { background: #06B6D4; border-color: #06B6D4; }
    .btn-favorite:hover, .btn-watchlater:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .btn-back, .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: white;
      background: rgba(255,255,255,0.1);
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      margin-right: 0.5rem;
      margin-bottom: 1rem;
      transition: background 0.3s;
      width: fit-content;
      text-decoration: none;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }
    .btn-back:hover, .btn-retry:hover { background: rgba(255,255,255,0.2); }
    .error-msg {
      color: #ff4d4d;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
    }
    .error-details {
      color: #ccc;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .hidden { display: none; }
    @media (max-width: 768px) {
      .player-movie-title { font-size: 1.5rem; }
      .player-container { padding: 0.75rem; }
      .player-info-panel { padding: 1rem; }
    }
  </style>
</head>
<body class="player-page">
  <nav class="navbar player-nav">
    <div class="nav-container">
      <div class="nav-left">
        <a href="index.html" class="logo">
          <span class="logo-text">Sandeep<span class="accent">Flix</span></span>
        </a>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back</a>
      </div>
      <div class="nav-right">
        <span id="nowPlayingTitle" class="now-playing-title"></span>
      </div>
    </div>
  </nav>

  <main class="player-container">
    <div class="video-wrapper">
      <video id="videoPlayer" controls autoplay muted playsinline></video>
    </div>

    <!-- Error message (hidden by default) -->
    <div id="errorBox" class="hidden" style="text-align: center; padding: 2rem;">
      <p class="error-msg">⚠️ Unable to play this video.</p>
      <p class="error-details">
        The video may be blocked by your network or browser settings.<br>
        <a id="directLink" href="#" target="_blank" style="color: #06B6D4;">Download / Open directly</a>
      </p>
      <button class="btn-retry" id="retryBtn"><i class="fas fa-redo"></i> Retry</button>
    </div>

    <div class="player-info-panel" id="playerInfo">
      <h2 class="player-movie-title" id="playerMovieTitle">Loading...</h2>
      <div class="player-meta" id="playerMeta"></div>
      <div class="player-actions" id="playerActions">
        <button class="btn-favorite" id="playerFav"><i class="far fa-heart"></i> Favorite</button>
        <button class="btn-watchlater" id="playerWl"><i class="far fa-clock"></i> Watch Later</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p class="copyright">© 2026 SandeepFlix. All rights reserved.</p>
    </div>
  </footer>

  <script src="movies.js"></script>
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const movieId = urlParams.get('id');
      const video = document.getElementById('videoPlayer');
      const errorBox = document.getElementById('errorBox');
      const directLink = document.getElementById('directLink');
      const retryBtn = document.getElementById('retryBtn');
      const titleEl = document.getElementById('playerMovieTitle');
      const metaEl = document.getElementById('playerMeta');
      const nowPlaying = document.getElementById('nowPlayingTitle');
      const favBtn = document.getElementById('playerFav');
      const wlBtn = document.getElementById('playerWl');

      function loadMovie() {
        const movie = window.moviesData ? window.moviesData.find(m => m.id == movieId) : null;

        if (!movieId) {
          titleEl.textContent = 'No movie selected';
          return;
        }
        if (!movie) {
          titleEl.textContent = 'Movie not found';
          return;
        }

        // Update info
        titleEl.textContent = movie.title;
        nowPlaying.textContent = movie.title;
        metaEl.innerHTML = `
          <span>${movie.year}</span>
          <span>${movie.duration}</span>
          <span><i class="fas fa-star" style="color:#06B6D4"></i> ${movie.rating}</span>
          <span>${movie.genre}</span>
        `;

        // Set direct download link (use the video URL itself)
        directLink.href = movie.trailerUrl;

        // Attach error listener BEFORE setting src
        video.addEventListener('error', function onError() {
          video.classList.add('hidden');
          errorBox.classList.remove('hidden');
        }, { once: true }); // only trigger once

        // Actually set the source
        video.src = movie.trailerUrl;
        video.load();

        // If video can play, hide any previous error
        video.addEventListener('canplay', function() {
          errorBox.classList.add('hidden');
          video.classList.remove('hidden');
        });

        // Continue watching storage
        try {
          let list = JSON.parse(localStorage.getItem('continueWatching') || '[]');
          if (!list.includes(movie.id)) {
            list.unshift(movie.id);
            localStorage.setItem('continueWatching', JSON.stringify(list));
          }
        } catch(e) {}

        // Favourite / Watch Later
        function updateButton(btn, storageKey) {
          try {
            const arr = JSON.parse(localStorage.getItem(storageKey) || '[]');
            btn.classList.toggle('active', arr.includes(movie.id));
          } catch(e) {}
        }
        updateButton(favBtn, 'favorites');
        updateButton(wlBtn, 'watchLater');

        favBtn.onclick = () => {
          try {
            let favs = JSON.parse(localStorage.getItem('favorites') || '[]');
            if (favs.includes(movie.id)) favs = favs.filter(id => id !== movie.id);
            else favs.push(movie.id);
            localStorage.setItem('favorites', JSON.stringify(favs));
            favBtn.classList.toggle('active');
          } catch(e) {}
        };

        wlBtn.onclick = () => {
          try {
            let wl = JSON.parse(localStorage.getItem('watchLater') || '[]');
            if (wl.includes(movie.id)) wl = wl.filter(id => id !== movie.id);
            else wl.push(movie.id);
            localStorage.setItem('watchLater', JSON.stringify(wl));
            wlBtn.classList.toggle('active');
          } catch(e) {}
        };
      }

      // Retry button
      retryBtn.addEventListener('click', function() {
        errorBox.classList.add('hidden');
        video.classList.remove('hidden');
        const currentMovie = window.moviesData.find(m => m.id == movieId);
        if (currentMovie) {
          video.src = currentMovie.trailerUrl;
          video.load();
        }
      });

      // Ensure moviesData is loaded, then run
      if (window.moviesData) {
        loadMovie();
      } else {
        window.addEventListener('load', function() {
          if (window.moviesData) loadMovie();
          else titleEl.textContent = 'Movie data could not be loaded.';
        });
      }
    })();
  </script>
</body>
</html>
