<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Under Maintenance</title>
    <style>
      :root {
        color-scheme: dark;
        color: #f8fafc;
        background: #020617;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .maintenance {
        max-width: 520px;
        width: 100%;
        text-align: center;
        padding: 3rem 2rem;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.9);
        box-shadow: 0 30px 80px rgba(15, 23, 42, 0.3);
      }

      .maintenance__emoji {
        display: block;
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .maintenance__title {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: -0.05rem;
      }

      .maintenance__subtitle {
        margin: 1rem 0 1.5rem;
        color: #94a3b8;
        line-height: 1.7;
        font-size: 1rem;
      }

      .maintenance__note {
        border-top: 1px solid rgba(148, 163, 184, 0.18);
        padding-top: 1rem;
        color: #cbd5e1;
        font-size: 0.95rem;
      }

      a {
        color: #7dd3fc;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="maintenance">
      <span class="maintenance__emoji" aria-hidden="true">🛠️</span>
      <h1 class="maintenance__title">We'll be back soon</h1>
      <p class="maintenance__subtitle">
        The page at <strong>/solti</strong> is currently under maintenance.
        Thanks for your patience while we make improvements.
      </p>
      <p class="maintenance__note">
        In the meantime, you can head back to the main site at
        <a href="/">sandeepgaire.com.np</a>.
      </p>
    </main>
  </body>
</html>
