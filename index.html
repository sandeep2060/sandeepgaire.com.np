<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <style>
        body {
            text-align: center;
            padding: 10%;
            font: 20px Helvetica, sans-serif;
            color: #333;
            background-color: #f9f9f9;
            margin: 0;
        }
        h1 {
            font-size: 50px;
            margin: 0;
            color: #2c3e50;
        }
        article {
            display: block;
            text-align: left;
            max-width: 650px;
            margin: 0 auto;
        }
        p {
            line-height: 1.6;
        }
        a {
            color: #dc8100;
            text-decoration: none;
        }
        a:hover {
            color: #333;
            text-decoration: underline;
        }
        @media only screen and (max-width : 480px) {
            body { padding: 5%; }
            h1 { font-size: 40px; }
        }
    </style>
</head>
<body>
    <article>
        <h1>Site is temporarily unavailable.</h1>
        <p>Scheduled maintenance is currently in progress. We apologize for any inconvenience.</p>
        <p>Please check back soon. If you have urgent questions, contact us at <a href="mailto:support@example.com">support@example.com</a>.</p>
        <p id="signature">— The Team</p>
    </article>
</body>
</html>
