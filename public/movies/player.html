    <!-- Player logic -->
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = parseInt(urlParams.get('id'));
            const video = document.getElementById('videoPlayer');
            const errorBox = document.getElementById('errorBox');
            const directLink = document.getElementById('directLink');
            const retryBtn = document.getElementById('retryBtn');
            const titleEl = document.getElementById('playerMovieTitle');
            const metaEl = document.getElementById('playerMeta');
            const nowPlaying = document.getElementById('nowPlayingTitle');
            const favBtn = document.getElementById('playerFav');
            const wlBtn = document.getElementById('playerWl');

            const movie = moviesData.find(m => m.id === movieId);

            if (!movieId || !movie) {
                titleEl.textContent = movieId ? 'Movie not found' : 'No movie selected';
                return;
            }

            // Populate info
            titleEl.textContent = movie.title;
            nowPlaying.textContent = movie.title;
            metaEl.innerHTML = `
                <span>${movie.year}</span>
                <span>${movie.duration}</span>
                <span><i class="fas fa-star" style="color:var(--cyan)"></i> ${movie.rating}</span>
                <span>${movie.genre}</span>
            `;

            // Set up video and error handling
            directLink.href = movie.trailerUrl;

            function loadVideo() {
                video.src = movie.trailerUrl;
                video.load();
            }

            video.addEventListener('error', function() {
                errorBox.classList.add('show');
                video.style.display = 'none';
            }, { once: true });

            video.addEventListener('canplay', function() {
                errorBox.classList.remove('show');
                video.style.display = 'block';
            });

            loadVideo();

            retryBtn.addEventListener('click', function() {
                errorBox.classList.remove('show');
                video.style.display = 'block';
                loadVideo();
            });

            // Continue Watching
            try {
                let list = JSON.parse(localStorage.getItem('continueWatching') || '[]');
                if (!list.includes(movie.id)) {
                    list.unshift(movie.id);
                    localStorage.setItem('continueWatching', JSON.stringify(list));
                }
            } catch(e) {}

            // Favorites / Watch Later
            function updateButton(btn, storageKey) {
                try {
                    const arr = JSON.parse(localStorage.getItem(storageKey) || '[]');
                    btn.classList.toggle('active', arr.includes(movie.id));
                } catch(e) {}
            }
            updateButton(favBtn, 'favorites');
            updateButton(wlBtn, 'watchLater');

            favBtn.addEventListener('click', function() {
                let favs = JSON.parse(localStorage.getItem('favorites') || '[]');
                if (favs.includes(movie.id)) {
                    favs = favs.filter(id => id !== movie.id);
                } else {
                    favs.push(movie.id);
                }
                localStorage.setItem('favorites', JSON.stringify(favs));
                favBtn.classList.toggle('active');
            });

            wlBtn.addEventListener('click', function() {
                let wl = JSON.parse(localStorage.getItem('watchLater') || '[]');
                if (wl.includes(movie.id)) {
                    wl = wl.filter(id => id !== movie.id);
                } else {
                    wl.push(movie.id);
                }
                localStorage.setItem('watchLater', JSON.stringify(wl));
                wlBtn.classList.toggle('active');
            });
        })();
    </script>
