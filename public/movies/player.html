<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Now – SandeepFlix</title>
  <meta name="description" content="Stream movies instantly on SandeepFlix.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Minimal player-specific styles */
    .player-page { background: #000; }
    .player-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .player-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }
    .video-wrapper {
      width: 100%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      margin-bottom: 1.5rem;
    }
    video {
      width: 100%;
      display: block;
      outline: none;
    }
    .player-info-panel {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .player-movie-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .player-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      color: #b3b3b3;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }
    .player-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .btn-favorite, .btn-watchlater {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    .btn-favorite.active { background: #7C3AED; border-color: #7C3AED; }
    .btn-watchlater.active { background: #06B6D4; border-color: #06B6D4; }
    .btn-favorite:hover, .btn-watchlater:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: white;
      background: rgba(255,255,255,0.1);
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      transition: background 0.3s;
      width: fit-content;
      text-decoration: none;
      font-weight: 500;
    }
    .btn-back:hover { background: rgba(255,255,255,0.2); }
    .error-msg {
      color: #ff4d4d;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
    }
    @media (max-width: 768px) {
      .player-movie-title { font-size: 1.5rem; }
      .player-container { padding: 0.75rem; }
      .player-info-panel { padding: 1rem; }
    }
  </style>
</head>
<body class="player-page">
  <nav class="navbar player-nav">
    <div class="nav-container">
      <div class="nav-left">
        <a href="index.html" class="logo">
          <span class="logo-text">Sandeep<span class="accent">Flix</span></span>
        </a>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back</a>
      </div>
      <div class="nav-right">
        <span id="nowPlayingTitle" class="now-playing-title"></span>
      </div>
    </div>
  </nav>

  <main class="player-container">
    <div class="video-wrapper">
      <video id="videoPlayer" controls autoplay muted playsinline>
        Your browser does not support the video tag.
      </video>
    </div>

    <div class="player-info-panel" id="playerInfo">
      <h2 class="player-movie-title" id="playerMovieTitle">Loading...</h2>
      <div class="player-meta" id="playerMeta"></div>
      <div class="player-actions" id="playerActions">
        <button class="btn-favorite" id="playerFav"><i class="far fa-heart"></i> Favorite</button>
        <button class="btn-watchlater" id="playerWl"><i class="far fa-clock"></i> Watch Later</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p class="copyright">© 2026 SandeepFlix. All rights reserved.</p>
    </div>
  </footer>

  <!-- Inline movie data (no external movies.js needed if you already have it, but keeping it self-contained) -->
  <script>
    // Replace this with your full moviesData array if you prefer, but for safety we load externally.
    // We'll load movies.js and then proceed.
  </script>
  <script src="movies.js"></script>
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const movieId = urlParams.get('id');
      const video = document.getElementById('videoPlayer');
      const titleEl = document.getElementById('playerMovieTitle');
      const metaEl = document.getElementById('playerMeta');
      const nowPlaying = document.getElementById('nowPlayingTitle');
      const favBtn = document.getElementById('playerFav');
      const wlBtn = document.getElementById('playerWl');

      if (!movieId) {
        titleEl.textContent = 'No movie selected';
        return;
      }

      // Wait for moviesData to be available (it might not be loaded synchronously)
      function loadMovie() {
        const movie = window.moviesData.find(m => m.id == movieId);
        if (!movie) {
          titleEl.textContent = 'Movie not found';
          return;
        }

        // Update UI
        titleEl.textContent = movie.title;
        nowPlaying.textContent = movie.title;
        metaEl.innerHTML = `
          <span>${movie.year}</span>
          <span>${movie.duration}</span>
          <span><i class="fas fa-star" style="color:#06B6D4"></i> ${movie.rating}</span>
          <span>${movie.genre}</span>
        `;

        // Set video source directly (most reliable)
        video.src = movie.trailerUrl;
        video.load();
        // Add error handling
        video.addEventListener('error', function() {
          titleEl.innerHTML = '<span class="error-msg">⚠️ Unable to play this video. The link might be broken or unsupported.</span>';
        });

        // Save to Continue Watching
        try {
          let list = JSON.parse(localStorage.getItem('continueWatching') || '[]');
          if (!list.includes(movie.id)) {
            list.unshift(movie.id);
            localStorage.setItem('continueWatching', JSON.stringify(list));
          }
        } catch(e) {}

        // Favourite / Watch Later logic
        function updateButton(btn, storageKey) {
          try {
            const arr = JSON.parse(localStorage.getItem(storageKey) || '[]');
            if (arr.includes(movie.id)) btn.classList.add('active');
            else btn.classList.remove('active');
          } catch(e) {}
        }
        updateButton(favBtn, 'favorites');
        updateButton(wlBtn, 'watchLater');

        favBtn.addEventListener('click', function() {
          try {
            let favs = JSON.parse(localStorage.getItem('favorites') || '[]');
            if (favs.includes(movie.id)) {
              favs = favs.filter(id => id !== movie.id);
              favBtn.classList.remove('active');
            } else {
              favs.push(movie.id);
              favBtn.classList.add('active');
            }
            localStorage.setItem('favorites', JSON.stringify(favs));
          } catch(e) {}
        });

        wlBtn.addEventListener('click', function() {
          try {
            let wl = JSON.parse(localStorage.getItem('watchLater') || '[]');
            if (wl.includes(movie.id)) {
              wl = wl.filter(id => id !== movie.id);
              wlBtn.classList.remove('active');
            } else {
              wl.push(movie.id);
              wlBtn.classList.add('active');
            }
            localStorage.setItem('watchLater', JSON.stringify(wl));
          } catch(e) {}
        });
      }

      // If moviesData already exists, load immediately; else wait for script to load
      if (window.moviesData) {
        loadMovie();
      } else {
        // Wait for the external script to load
        window.addEventListener('load', function() {
          if (window.moviesData) loadMovie();
          else titleEl.textContent = 'Movie data could not be loaded.';
        });
      }
    })();
  </script>
</body>
</html>
